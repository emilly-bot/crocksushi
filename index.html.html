<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrockSushi – Pedidos</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: #f0f0f0; min-height: 100vh; }

header {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 2px solid #e94560;
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo h1 { font-size: 1.5rem; color: #fff; letter-spacing: 1px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.badge { background: #e94560; color: white; border-radius: 50px; padding: 5px 16px; font-size: 0.85rem; font-weight: bold; display: none; animation: blink 0.6s infinite alternate; }
@keyframes blink { from{opacity:1} to{opacity:.4} }

.toolbar { background: #111122; padding: 12px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid #1e1e3a; }
.toolbar input { flex: 1; min-width: 220px; background: #0d0d1a; border: 1px solid #2a2a5a; color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 0.9rem; }
.toolbar input:focus { outline: none; border-color: #e94560; }
.btn { background: #e94560; color: #fff; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: bold; transition: .2s; white-space: nowrap; }
.btn:hover { background: #c73652; }
.btn.ghost { background: #1e1e3e; }
.btn.ghost:hover { background: #2a2a5a; }

.status-bar { padding: 8px 20px; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #666; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: #555; flex-shrink: 0; }
.dot.on { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
.dot.err { background: #e94560; }

/* Summary */
.summary { padding: 10px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
.stat {
  background: #1a1a2e; border-radius: 10px; padding: 12px 16px;
  border-left: 3px solid #333360;
}
.stat.green { border-left-color: #4caf50; }
.stat.red   { border-left-color: #e94560; }
.stat.yellow{ border-left-color: #f9c74f; }
.stat label { display: block; font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.stat strong { font-size: 1.2rem; color: #fff; }

/* Map panel */
#mapPanel { display: none; background: #111122; margin: 0 20px 10px; border: 1px solid #2a2a5a; border-radius: 12px; padding: 16px; }
#mapPanel h3 { color: #f9c74f; font-size: 0.9rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
.map-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.map-item label { display: block; font-size: 0.78rem; color: #aaa; margin-bottom: 4px; }
.map-item select { width: 100%; background: #0d0d1a; border: 1px solid #2a2a5a; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; }

/* Filters */
.filters { padding: 8px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.filters input { background: #111122; border: 1px solid #2a2a5a; color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 0.83rem; }
.filters input:focus { outline: none; border-color: #e94560; }
.filter-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #2a2a5a; background: #111122; color: #aaa; cursor: pointer; font-size: 0.8rem; transition: .2s; }
.filter-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
.count-badge { background: #1e1e3e; color: #aaa; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-left: auto; }

/* Orders grid */
.orders-grid { padding: 10px 20px 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

.order-card {
  background: #1a1a2e; border-radius: 14px; padding: 16px;
  border-left: 4px solid #333360; position: relative; transition: transform .15s, opacity .2s;
}
.order-card.is-new   { border-left-color: #4caf50; animation: slideIn .35s ease; }
.order-card.enviado  { border-left-color: #4caf50; opacity: .75; }
.order-card.cancelado{ border-left-color: #e94560; opacity: .65; }
.order-card:hover { transform: translateY(-2px); }
@keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

.order-num { position: absolute; top: 12px; right: 12px; background: #1e1e3e; color: #888; border-radius: 50px; padding: 2px 10px; font-size: 0.72rem; }
.status-tag { position: absolute; top: 12px; left: -4px; border-radius: 0 6px 6px 0; padding: 2px 10px; font-size: 0.7rem; font-weight: bold; }
.status-tag.enviado   { background: #4caf50; color: #fff; }
.status-tag.cancelado { background: #e94560; color: #fff; }

.c-nome    { font-size: 1.2rem; font-weight: bold; color: #f9c74f; margin-bottom: 8px; padding-right: 50px; text-shadow: 0 0 12px rgba(249,199,79,.4); letter-spacing: .3px; }
.c-produto { color: #f9c74f; font-size: 0.95rem; margin-bottom: 6px; }
.c-valor   { color: #4caf50; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; }
.c-meta    { display: flex; gap: 12px; flex-wrap: wrap; }
.c-meta span { font-size: 0.78rem; color: #888; }
.c-obs     { margin-top: 10px; background: #0d0d1a; padding: 7px 11px; border-radius: 8px; font-size: 0.82rem; color: #ccc; }
.c-extra   { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
.c-tag     { background: #1e1e3e; color: #aaa; padding: 2px 9px; border-radius: 20px; font-size: 0.75rem; }

/* Action buttons */
.c-actions { display: flex; gap: 8px; margin-top: 12px; }
.act-btn {
  flex: 1; padding: 7px 6px; border-radius: 8px; border: none;
  cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: .2s;
}
.act-btn.enviar   { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf50; }
.act-btn.enviar:hover   { background: #4caf50; color: #fff; }
.act-btn.cancelar { background: #3a1a1a; color: #e94560; border: 1px solid #e94560; }
.act-btn.cancelar:hover { background: #e94560; color: #fff; }
.act-btn.pendente { background: #2a2a1a; color: #f9c74f; border: 1px solid #f9c74f; }
.act-btn.pendente:hover { background: #f9c74f; color: #000; }
.act-btn:disabled { opacity: .4; cursor: default; }

.empty { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: #444; }
.empty span { font-size: 3rem; display: block; margin-bottom: 12px; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 20px; background: #1a1a2e; border: 1px solid #4caf50; border-radius: 14px; padding: 14px 18px; z-index: 999; display: none; max-width: 310px; box-shadow: 0 4px 24px rgba(76,175,80,.35); animation: toastIn .3s ease; }
.toast.show { display: block; }
@keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.toast-title { color: #4caf50; font-weight: bold; margin-bottom: 4px; font-size: 0.9rem; }
.toast-body  { font-size: 0.85rem; color: #ccc; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span style="font-size:1.8rem">🥚🍣</span>
    <h1>CrockSushi</h1>
  </div>
  <div class="header-right">
    <span style="font-size:0.78rem;color:#666" id="nextRefresh"></span>
    <div class="badge" id="badge">🔔 NOVO PEDIDO!</div>
  </div>
</header>

<div class="toolbar">
  <input type="text" id="sheetUrl" placeholder="Link CSV da planilha publicada..." />
  <button class="btn" onclick="conectar()">🔌 Conectar</button>
  <button class="btn ghost" onclick="toggleMap()">🗂️ Colunas</button>
  <button class="btn ghost" onclick="resetNew()">✅ Marcar todos como vistos</button>
</div>

<div id="mapPanel">
  <h3>🗂️ Mapeamento de Colunas</h3>
  <div class="map-grid" id="mapGrid"></div>
  <br>
  <button class="btn" onclick="salvarMap()">💾 Salvar</button>
  <button class="btn ghost" onclick="toggleMap()" style="margin-left:8px">Fechar</button>
</div>

<div class="status-bar">
  <div class="dot" id="dot"></div>
  <span id="statusTxt">Aguardando configuração...</span>
</div>

<!-- Summary -->
<div class="summary">
  <div class="stat yellow"><label>📦 Total de Pedidos</label><strong id="sTotalPedidos">0</strong></div>
  <div class="stat"><label>⏳ Pendentes</label><strong id="sPendentes">0</strong></div>
  <div class="stat green"><label>✅ Enviados</label><strong id="sEnviados">0</strong></div>
  <div class="stat red"><label>❌ Cancelados</label><strong id="sCancelados">0</strong></div>
  <div class="stat green"><label>💰 Faturamento (Enviados)</label><strong id="sFaturamento">R$ 0,00</strong></div>
  <div class="stat"><label>🎯 Ticket Médio</label><strong id="sTicket">R$ 0,00</strong></div>
</div>

<!-- Filters -->
<div class="filters">
  <input type="text" id="filterText" placeholder="🔍 Buscar..." oninput="renderFiltered()" />
  <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
  <button class="filter-btn" onclick="setFilter('pendente', this)">⏳ Pendentes</button>
  <button class="filter-btn" onclick="setFilter('enviado', this)">✅ Enviados</button>
  <button class="filter-btn" onclick="setFilter('cancelado', this)">❌ Cancelados</button>
  <span class="count-badge" id="countBadge"></span>
</div>

<div class="orders-grid" id="grid">
  <div class="empty"><span>🥚</span>Cole o link da planilha e clique em Conectar!</div>
</div>

<div class="toast" id="toast">
  <div class="toast-title">🔔 Novo Pedido Recebido!</div>
  <div class="toast-body" id="toastBody"></div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT-oGuFjJlCiMU4Oy26Iw5Ks5QylEVxnuBOofL16aCRQVb_FpaEj308XZYQ_fCHcbn_4-AiqE76D28J/pub?output=csv";
const INTERVAL = 30;

let csvUrl   = localStorage.getItem('cs_url') || CSV_URL;
let colMap   = JSON.parse(localStorage.getItem('cs_map')    || '{}');
let seenIds  = new Set(JSON.parse(localStorage.getItem('cs_seen')   || '[]'));
// { idx: 'pendente' | 'enviado' | 'cancelado' }
let statuses = JSON.parse(localStorage.getItem('cs_status') || '{}');
let headers  = [];
let allOrders = [];
let timer = null, countdown = INTERVAL;
let activeFilter = 'todos';

document.getElementById('sheetUrl').value = csvUrl;

// ---- Audio ----
function beep() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    [[0,880],[0.2,1046],[0.4,1318]].forEach(([t,f]) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.35, ac.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+t+0.18);
      o.start(ac.currentTime+t); o.stop(ac.currentTime+t+0.2);
    });
  } catch(e) {}
}

// ---- Toast ----
function showToast(msg) {
  document.getElementById('toastBody').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove('show'), 6000);
}

function flashBadge() {
  const b = document.getElementById('badge');
  b.style.display = 'block';
  clearTimeout(b._to);
  b._to = setTimeout(() => b.style.display = 'none', 7000);
}

// ---- CSV ----
function parseCsv(text) {
  const rows = [];
  const lines = text.trim().split('\n');
  if (!lines.length) return rows;
  const parseLine = l => {
    const cols = []; let cur = '', inQ = false;
    for (let c of l) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    return cols;
  };
  headers = parseLine(lines[0]).map(h => h.replace(/"/g,'').trim());
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    rows.push({ _idx: i - 1, _cols: parseLine(lines[i]) });
  }
  return rows;
}

function gc(order, key) {
  const idx = colMap[key];
  if (idx === undefined || idx === '') return '';
  return (order._cols[+idx] || '').replace(/^"|"$/g,'').trim();
}

function fmtVal(v) {
  if (!v) return '';
  const n = parseFloat(v.replace(/[^\d.,]/g,'').replace(',','.'));
  if (isNaN(n)) return v;
  return 'R$ ' + n.toFixed(2).replace('.',',');
}

function parseVal(v) {
  if (!v) return 0;
  const n = parseFloat(v.replace(/[^\d.,]/g,'').replace(',','.'));
  return isNaN(n) ? 0 : n;
}

function fmtDt(v) {
  if (!v) return { dia:'', hora:'' };
  let dia='', hora='';
  if (v.includes(' '))      { const p=v.split(' '); dia=p[0]; hora=p.slice(1).join(' ').slice(0,5); }
  else if (v.includes('T')) { const p=v.split('T'); dia=p[0]; hora=(p[1]||'').slice(0,5); }
  else                      { dia=v; }
  return { dia, hora };
}

// ---- Status ----
function setStatus(idx, status) {
  statuses[idx] = status;
  localStorage.setItem('cs_status', JSON.stringify(statuses));
  renderOrders(allOrders);
}

// ---- Summary ----
function buildSummary(orders) {
  const total     = orders.length;
  const enviados  = orders.filter(o => statuses[o._idx] === 'enviado');
  const cancelados= orders.filter(o => statuses[o._idx] === 'cancelado');
  const pendentes = orders.filter(o => !statuses[o._idx] || statuses[o._idx] === 'pendente');

  let fat = 0;
  enviados.forEach(o => fat += parseVal(gc(o,'valor')));
  const ticket = enviados.length ? fat / enviados.length : 0;
  const fmtR = n => 'R$ ' + n.toFixed(2).replace('.',',');

  document.getElementById('sTotalPedidos').textContent = total;
  document.getElementById('sPendentes').textContent    = pendentes.length;
  document.getElementById('sEnviados').textContent     = enviados.length;
  document.getElementById('sCancelados').textContent   = cancelados.length;
  document.getElementById('sFaturamento').textContent  = fmtR(fat);
  document.getElementById('sTicket').textContent       = fmtR(ticket);
}

// ---- Filter ----
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFiltered();
}

// ---- Render ----
function renderOrders(orders) {
  allOrders = orders;
  buildSummary(orders);
  renderFiltered();
}

function renderFiltered() {
  const q = document.getElementById('filterText').value.toLowerCase();
  let filtered = allOrders;

  if (activeFilter !== 'todos') {
    filtered = filtered.filter(o => {
      const s = statuses[o._idx] || 'pendente';
      return s === activeFilter;
    });
  }
  if (q) filtered = filtered.filter(o => o._cols.some(c => c.toLowerCase().includes(q)));

  document.getElementById('countBadge').textContent = `${filtered.length} pedido${filtered.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('grid');

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><span>🔍</span>Nenhum pedido encontrado.</div>';
    return;
  }

  const reversed = [...filtered].reverse();
  grid.innerHTML = reversed.map(o => {
    const status  = statuses[o._idx] || 'pendente';
    const isNew   = !seenIds.has(o._idx) && status === 'pendente';
    const num     = allOrders.indexOf(o) + 1;
    const nome    = gc(o,'nome')    || 'Cliente';
    const produto = gc(o,'produto') || '—';
    const valor   = fmtVal(gc(o,'valor'));
    const obs     = gc(o,'obs');
    const { dia, hora } = fmtDt(gc(o,'dataHora'));

    const knownKeys = Object.values(colMap).map(String);
    const extras = headers
      .map((h, i) => ({ h, v: (o._cols[i]||'').replace(/^"|"$/g,'').trim(), i }))
      .filter(x => x.v && !knownKeys.includes(String(x.i)));

    const statusTag = status !== 'pendente'
      ? `<div class="status-tag ${status}">${status === 'enviado' ? '✅ Enviado' : '❌ Cancelado'}</div>`
      : '';

    const btnEnviar   = `<button class="act-btn enviar"   ${status==='enviado'?'disabled':''} onclick="setStatus(${o._idx},'enviado')">✅ Enviado</button>`;
    const btnCancelar = `<button class="act-btn cancelar" ${status==='cancelado'?'disabled':''} onclick="setStatus(${o._idx},'cancelado')">❌ Cancelado</button>`;
    const btnPendente = status !== 'pendente'
      ? `<button class="act-btn pendente" onclick="setStatus(${o._idx},'pendente')">↩️ Pendente</button>`
      : '';

    return `<div class="order-card ${isNew?'is-new':''} ${status!=='pendente'?status:''}">
      ${statusTag}
      <div class="order-num">#${num}</div>
      <div class="c-nome" style="margin-top:${status!=='pendente'?'18px':'0'}">👤 ${nome}</div>
      <div class="c-produto">📦 ${produto}</div>
      ${valor ? `<div class="c-valor">💰 ${valor}</div>` : ''}
      <div class="c-meta">
        ${dia  ? `<span>📅 ${dia}</span>`  : ''}
        ${hora ? `<span>🕐 ${hora}</span>` : ''}
      </div>
      ${obs ? `<div class="c-obs">💬 ${obs}</div>` : ''}
      ${extras.length ? `<div class="c-extra">${extras.map(x=>`<span class="c-tag">${x.h}: ${x.v}</span>`).join('')}</div>` : ''}
      <div class="c-actions">${btnEnviar}${btnCancelar}${btnPendente}</div>
    </div>`;
  }).join('');
}

// ---- Auto-map ----
const autoKeywords = {
  dataHora: ['carimbo','data','hora','timestamp','time'],
  nome:     ['nome','cliente','name'],
  produto:  ['produto','pedido','ovo','item','sabor','escolha','tipo','quant'],
  valor:    ['valor','preço','preco','total','price'],
  obs:      ['obs','observ','recado','note','msg','mensagem','adic']
};
function autoMap(hdrs) {
  const m = {}, used = new Set();
  Object.entries(autoKeywords).forEach(([key, kws]) => {
    hdrs.forEach((h, i) => {
      if (used.has(i)) return;
      if (kws.some(k => h.toLowerCase().includes(k))) {
        if (m[key] === undefined) { m[key] = i; used.add(i); }
      }
    });
  });
  return m;
}

function buildMapUI(hdrs) {
  const keys = { dataHora:'📅 Data/Hora', nome:'👤 Nome', produto:'📦 Produto/Pedido', valor:'💰 Valor', obs:'💬 Observações' };
  document.getElementById('mapGrid').innerHTML = Object.entries(keys).map(([k,label]) => `
    <div class="map-item">
      <label>${label}</label>
      <select id="map_${k}">
        <option value="">— não usar —</option>
        ${hdrs.map((h,i) => `<option value="${i}" ${String(colMap[k])===String(i)?'selected':''}>${h}</option>`).join('')}
      </select>
    </div>`).join('');
}

function salvarMap() {
  ['dataHora','nome','produto','valor','obs'].forEach(k => {
    const el = document.getElementById('map_'+k);
    if (el) colMap[k] = el.value;
  });
  localStorage.setItem('cs_map', JSON.stringify(colMap));
  toggleMap();
  renderOrders(allOrders);
}

function toggleMap() {
  const p = document.getElementById('mapPanel');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

// ---- Fetch ----
async function fetchData(isPolling) {
  if (!csvUrl) return;
  try {
    const r = await fetch(csvUrl + '&_=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    const orders = parseCsv(text);

    if (!Object.keys(colMap).length) {
      colMap = autoMap(headers);
      localStorage.setItem('cs_map', JSON.stringify(colMap));
    }
    buildMapUI(headers);

    const newOnes = orders.filter(o => !seenIds.has(o._idx));
    if (isPolling && newOnes.length) {
      beep(); flashBadge();
      const last = newOnes[newOnes.length - 1];
      const nome = gc(last,'nome') || 'Novo cliente';
      const prod = gc(last,'produto') || 'um item';
      const val  = fmtVal(gc(last,'valor'));
      showToast(`${nome} pediu ${prod}${val?' · '+val:''}`);
    }

    orders.forEach(o => seenIds.add(o._idx));
    localStorage.setItem('cs_seen', JSON.stringify([...seenIds]));

    renderOrders(orders);
    document.getElementById('dot').className = 'dot on';
    document.getElementById('statusTxt').textContent =
      `✅ Conectado · ${orders.length} pedidos · Última atualização: ${new Date().toLocaleTimeString('pt-BR')}`;
  } catch(e) {
    document.getElementById('dot').className = 'dot err';
    document.getElementById('statusTxt').textContent = '❌ Erro: ' + e.message;
  }
}

function conectar() {
  const url = document.getElementById('sheetUrl').value.trim();
  if (!url) { alert('Cole o link da planilha!'); return; }
  csvUrl = url;
  localStorage.setItem('cs_url', url);
  seenIds.clear();
  localStorage.removeItem('cs_seen');
  startPolling();
}

function resetNew() {
  allOrders.forEach(o => seenIds.add(o._idx));
  localStorage.setItem('cs_seen', JSON.stringify([...seenIds]));
  renderOrders(allOrders);
}

function startPolling() {
  if (timer) clearInterval(timer);
  fetchData(false);
  countdown = INTERVAL;
  timer = setInterval(() => {
    countdown--;
    document.getElementById('nextRefresh').textContent = `Atualiza em ${countdown}s`;
    if (countdown <= 0) { countdown = INTERVAL; fetchData(true); }
  }, 1000);
}

if (csvUrl) startPolling();
</script>
</body>
</html>
